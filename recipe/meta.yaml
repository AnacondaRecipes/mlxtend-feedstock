{% set name = "mlxtend" %}
{% set version = "0.24.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 594f124539d84c3a86951715e16656abfc3005f5da7d3a56b53c77d28d5263f8

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python
    - setuptools >=59.0.0
  run:
    - python
    - joblib >=1.5.2
    - matplotlib-base >=3.10.8
    - numpy >=2.3.5
    - pandas >=2.3.3
    - scikit-learn >=1.8.0
    - scipy >=1.16.3

test:
  imports:
    - mlxtend
    - mlxtend._base
    - mlxtend.classifier
    - mlxtend.cluster
    - mlxtend.data
    - mlxtend.evaluate
    - mlxtend.externals
    - mlxtend.feature_extraction
    - mlxtend.feature_selection
    - mlxtend.file_io
    - mlxtend.frequent_patterns
    - mlxtend.math
    - mlxtend.plotting
    - mlxtend.preprocessing
    - mlxtend.regressor
    - mlxtend.text
    - mlxtend.utils
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/rasbt/mlxtend
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE-BSD3.txt
  summary: Machine Learning Library Extensions
  description: |
    A library of Python tools and extensions for data science and machine learning.
  doc_url: https://rasbt.github.io/mlxtend/
  dev_url: https://github.com/rasbt/mlxtend

extra:
  recipe-maintainers:
    - rasbt
